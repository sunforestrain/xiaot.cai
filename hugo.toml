baseURL = 'https://sunforestrain.github.io/xiaot.cai/'
title = 'xiaot'
theme = 'PaperMod'
languageCode = 'zh-cn'
defaultContentLanguage = 'zh-cn'
hasCJKLanguage = true
paginate = 10

[params]
  author = "Your Name"
  description = "A personal blog"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true

  [params.profileMode]
    enabled = true
    title = "Hi, I'm [Your Name] 👋"
    subtitle = "Welcome to my digital garden."
    imageUrl = ""
    buttons = [
        { name = "Archives", url = "/posts/" },
        { name = "Search", url = "/search/" }
    ]

  [params.socialIcons]
    [[params.socialIcons]]
      name = "github"
      url = "https://github.com/yourusername"
    [[params.socialIcons]]
      name = "rss"
      url = "/index.xml"

[[menu.main]]
  name = "Posts"
  url = "/posts/"
  weight = 1

[[menu.main]]
  name = "Search"
  url = "/search/"
  weight = 2